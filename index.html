<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dual Sens + Raw Accel Toolkit</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>

<style>
/* ======================
   THEME (inspired by sensitivity-converter style)
   dark glass + neon purple/blue
====================== */

:root{
  --bg:#070A12;
  --panel: rgba(20, 22, 40, 0.65);
  --panel2: rgba(30, 32, 60, 0.55);
  --stroke: rgba(120, 120, 255, 0.18);
  --stroke2: rgba(160, 120, 255, 0.35);

  --text:#EDEBFF;
  --muted:#9A97C2;

  --accent:#7C5CFF;
  --accent2:#A78BFA;
  --blue:#4DE3FF;
  --green:#3CFFB0;

  --radius:14px;
  --blur:14px;

  --mono: ui-monospace, SFMono-Regular, Menlo, monospace;
  --sans: system-ui, -apple-system, Segoe UI;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  background: radial-gradient(circle at 20% 20%, #1a1450 0%, transparent 40%),
              radial-gradient(circle at 80% 0%, #1b2a55 0%, transparent 45%),
              var(--bg);
  color:var(--text);
  font-family:var(--sans);
}

.container{
  max-width:1100px;
  margin:0 auto;
  padding:28px;
}

h2{
  font-size:22px;
  margin-bottom:6px;
}

.small{color:var(--muted);font-size:12px;margin-bottom:18px}

.panel{
  background:var(--panel);
  border:1px solid var(--stroke);
  backdrop-filter: blur(var(--blur));
  border-radius:var(--radius);
  padding:14px;
  margin-bottom:14px;
  box-shadow:0 0 40px rgba(120,80,255,0.08);
}

.row{display:flex;gap:10px;flex-wrap:wrap}

input,select{
  background:rgba(10,12,25,0.7);
  border:1px solid var(--stroke);
  color:var(--text);
  padding:10px;
  border-radius:10px;
  outline:none;
}

input:focus,select:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 3px rgba(124,92,255,0.15);
}

button{
  background:linear-gradient(135deg,var(--accent),#4de3ff);
  border:none;
  padding:10px 14px;
  border-radius:10px;
  color:white;
  font-weight:600;
</html>
